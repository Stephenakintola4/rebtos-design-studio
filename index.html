<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebtos Design Studio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .hero {
            padding: 40px;
            text-align: center;
            background: white;
        }

        .hero h1 {
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #111;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h2>Rebtos Design Studio</h2>
</header>

<section class="hero">
    <h1>Creative Design & Branding Studio</h1>
    <p>We design, brand, and bring your business to life.</p>

    <a class="btn" href="https://wa.me/2349152268181">Contact on WhatsApp</a>
</section>

<section class="gallery">
    <img src="images/pic1.jpg">
    <img src="images/pic2.jpg">
    <img src="images/pic3.jpg">
</section>

<footer>
    © 2026 Rebtos Design Studio
</footer>

</body>
</html>
